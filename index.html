<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkBuddy Skill Usage Report</title>
<style>
  :root {
    --bg: #f5f5f7;
    --surface: rgba(255,255,255,0.72);
    --surface-border: rgba(255,255,255,0.6);
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-caption: #8e8e93;
    --accent: #0071e3;
    --accent-soft: rgba(0,113,227,0.08);
    --green: #30d158;
    --green-soft: rgba(48,209,88,0.12);
    --orange: #ff9f0a;
    --orange-soft: rgba(255,159,10,0.12);
    --red: #ff3b30;
    --red-soft: rgba(255,59,48,0.10);
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 8px 32px rgba(0,0,0,0.06);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","PingFang SC","Helvetica Neue",sans-serif;
    background:var(--bg);color:var(--text-primary);
    -webkit-font-smoothing:antialiased;
    word-break:keep-all;overflow-wrap:anywhere;
    padding:0 24px;
  }
  .page{max-width:1040px;margin:0 auto;padding:48px 0 96px}

  .header{text-align:center;padding:48px 0 40px}
  .header h1{font-size:40px;font-weight:700;letter-spacing:-0.5px}
  .header .meta{display:flex;justify-content:center;gap:24px;font-size:14px;color:var(--text-caption);margin-top:10px;flex-wrap:wrap}
  .badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:500}
  .badge-green{background:var(--green-soft);color:#248a3d}
  .badge-orange{background:var(--orange-soft);color:#b86800}
  .badge-red{background:var(--red-soft);color:#b81b12}

  /* Stat cards */
  .grid{display:grid;gap:12px;margin-bottom:40px}
  .grid-5{grid-template-columns:repeat(5,1fr)}
  .grid-4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:768px){.grid-5,.grid-4{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:480px){.grid-5,.grid-4{grid-template-columns:1fr}}
  .stat-card{
    background:var(--surface);
    backdrop-filter:blur(40px) saturate(1.4);
    -webkit-backdrop-filter:blur(40px) saturate(1.4);
    border:1px solid var(--surface-border);
    border-radius:var(--radius);
    padding:20px;
    box-shadow:var(--shadow);
    text-align:center;
  }
  .stat-card .num{font-size:32px;font-weight:700;line-height:1.1}
  .stat-card .label{font-size:12px;color:var(--text-caption);margin-top:4px}

  /* Cumulative chart */
  .chart-section{margin-bottom:40px}
  .chart-section .section-title{font-size:18px;font-weight:600;margin-bottom:16px}
  .chart-card{
    background:var(--surface);
    backdrop-filter:blur(40px) saturate(1.4);
    -webkit-backdrop-filter:blur(40px) saturate(1.4);
    border:1px solid var(--surface-border);
    border-radius:var(--radius);
    padding:24px;
    box-shadow:var(--shadow);
  }
  .chart-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .chart-label{font-size:12px;color:var(--text-caption);width:40px;text-align:right;flex-shrink:0}
  .chart-bars{flex:1;display:flex;align-items:center;gap:3px;height:28px}
  .chart-bar-wrap{flex:1;height:20px;background:rgba(0,0,0,0.04);border-radius:4px;overflow:hidden;position:relative}
  .chart-bar{height:100%;border-radius:4px;transition:width 0.6s ease;min-width:2px}
  .chart-bar.daily{background:var(--accent);opacity:0.35}
  .chart-bar.cum{background:var(--accent)}
  .chart-num{font-size:11px;color:var(--text-secondary);width:36px;text-align:left;flex-shrink:0;font-variant-numeric:tabular-nums}

  /* Tabs */
  .tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .tab-btn{
    padding:8px 18px;border-radius:20px;border:none;
    font-size:14px;font-weight:500;cursor:pointer;
    background:var(--surface);color:var(--text-secondary);
    transition:all 0.2s;
  }
  .tab-btn:hover{background:var(--accent-soft);color:var(--accent)}
  .tab-btn.active{background:var(--accent);color:#fff}

  /* Table */
  .table-wrap{
    background:var(--surface);
    backdrop-filter:blur(40px) saturate(1.4);
    -webkit-backdrop-filter:blur(40px) saturate(1.4);
    border:1px solid var(--surface-border);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    overflow:visible;
    position:relative;
  }
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{text-align:left;padding:12px 16px;font-weight:600;color:var(--text-secondary);font-size:12px;text-transform:uppercase;letter-spacing:0.5px;background:rgba(0,0,0,0.02)}
  td{padding:10px 16px;border-top:1px solid rgba(0,0,0,0.04);vertical-align:middle}
  tr:hover{background:rgba(0,0,0,0.03)}
  tr{cursor:default}
  .skill-name{font-weight:500}
  .call-count{font-weight:600;font-variant-numeric:tabular-nums}
  .call-high{color:var(--accent)}
  .call-mid{color:var(--orange)}
  .call-low{color:var(--text-caption)}
  .call-zero{color:var(--red)}
  .desc{font-size:13px;color:var(--text-secondary);max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
  .dot-green{background:var(--green)}
  .dot-orange{background:var(--orange)}
  .dot-gray{background:#c7c7cc}
  .dot-red{background:var(--red)}
  .section-label{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
  .sl-freq{background:var(--green-soft);color:#248a3d}
  .sl-mid{background:var(--orange-soft);color:#b86800}
  .sl-low{background:rgba(142,142,147,0.12);color:#6e6e73}
  .sl-zero{background:var(--red-soft);color:#b81b12}
  .sl-self{background:rgba(0,113,227,0.10);color:#0058b0}
  .sl-github{background:rgba(0,0,0,0.06);color:#555}
  .sl-market{background:rgba(255,159,10,0.12);color:#b86800}
  .sl-builtin{background:rgba(142,142,147,0.10);color:#6e6e73}
  .sl-connector{background:rgba(48,209,88,0.10);color:#1a8a3a}

  /* Tooltip */
  .tooltip{
    position:fixed;
    background:rgba(29,29,31,0.92);
    backdrop-filter:blur(20px) saturate(1.4);
    -webkit-backdrop-filter:blur(20px) saturate(1.4);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:12px;
    padding:16px 20px;
    color:#fff;
    font-size:13px;
    pointer-events:none;
    opacity:0;
    transform:translateY(4px);
    transition:opacity 0.15s,transform 0.15s;
    z-index:100;
    min-width:220px;
    box-shadow:0 8px 40px rgba(0,0,0,0.3);
  }
  .tooltip.show{opacity:1;transform:translateY(0)}
  .tooltip .tt-name{font-weight:600;font-size:15px;margin-bottom:4px}
  .tooltip .tt-total{color:rgba(255,255,255,0.5);font-size:12px}
  .tooltip .tt-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;gap:16px}
  .tooltip .tt-row .day{color:rgba(255,255,255,0.5);font-size:12px}
  .tooltip .tt-row .val{font-weight:500;font-size:13px;min-width:20px;text-align:right}
  .tooltip .tt-bar{flex:1;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
  .tooltip .tt-bar-fill{height:100%;border-radius:3px;transition:width 0.3s}

  /* Footer */
  .footer{text-align:center;padding:32px 0;font-size:13px;color:var(--text-caption)}
  .footer a{color:var(--accent);text-decoration:none}
  .footer a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="page" id="app">

  <!-- Header -->
  <div class="header">
    <h1>Skill Usage Report</h1>
    <p style="font-size:15px;color:var(--text-secondary);margin-top:6px">WorkBuddy 技能使用情况 · 累计统计</p>
    <div class="meta">
      <span>📅 <span id="gen-date">2026-06-06</span></span>
      <span>📊 <span id="total-skills">83</span> skills</span>
      <span>🔍 <span id="total-calls">150</span> total calls</span>
      <span>📈 <span id="weekly-calls">124</span> this week</span>
    </div>
  </div>

  <!-- Stat cards -->
  <div class="grid grid-5" id="stat-cards"></div>

  <!-- Cumulative chart -->
  <div class="chart-section">
    <div class="section-title">📈 近7日累计调用趋势</div>
    <div class="chart-card" id="chart-card"></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('all')">全部</button>
    <button class="tab-btn" onclick="switchTab('freq')">高频 (3+)</button>
    <button class="tab-btn" onclick="switchTab('low')">低频 (1-2)</button>
    <button class="tab-btn" onclick="switchTab('zero')">零调用</button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:40px">#</th>
          <th style="width:50px">总调用</th>
          <th>技能名</th>
          <th style="width:100px">7日累计</th>
          <th style="width:60px">来源</th>
          <th>状态</th>
          <th>说明</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <!-- Tooltip -->
  <div class="tooltip" id="tooltip">
    <div class="tt-name" id="tt-name"></div>
    <div class="tt-total" id="tt-total"></div>
    <div style="font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:6px;margin-top:8px">近7天每日调用</div>
    <div id="tt-rows"></div>
  </div>

  <div class="footer">
    <p>数据来源：WorkBuddy 日志 · 每晚 22:00 自动更新</p>
    <p><a href="https://github.com/wherejiahe-bot/skill-usage-report">GitHub 仓库</a></p>
  </div>
</div>

<script src="data.js"></script>
<script>
const labels = DATA_DATE_LABELS;
const fullLabels = DATA_DATE_FULL;
const totalDaily = DATA_TOTAL_DAILY;
const totalCum = DATA_TOTAL_CUMULATIVE;
const skills = DATA_SKILLS;

let currentTab = 'all';
let ttTimer = null;

// Stat cards
function renderStats() {
  const called = skills.filter(s=>s.t>0).length;
  const zero = skills.filter(s=>s.t===0).length;
  const freq = skills.filter(s=>s.t>=3).length;
  const low = skills.filter(s=>s.t>=1&&s.t<3).length;
  const selfMade = skills.filter(s=>s.s==='self-made').length;
  const fromGitHub = skills.filter(s=>s.s==='github').length;
  const fromMarket = skills.filter(s=>s.s==='marketplace').length;
  const builtin = skills.filter(s=>s.s==='builtin'||s.s==='connector').length;
  const wk = totalCum[totalCum.length-1];
  document.getElementById('total-skills').textContent = skills.length;
  document.getElementById('total-calls').textContent = skills.reduce((a,s)=>a+s.t,0);
  document.getElementById('weekly-calls').textContent = wk;
  document.getElementById('gen-date').textContent = fullLabels[fullLabels.length-1];
  document.getElementById('stat-cards').innerHTML = `
    <div class="stat-card"><div class="num" style="color:#30d158">${called}</div><div class="label">有调用记录</div></div>
    <div class="stat-card"><div class="num" style="color:#ff3b30">${zero}</div><div class="label">零调用</div></div>
    <div class="stat-card"><div class="num" style="color:#0071e3">${selfMade}</div><div class="label">自制技能</div></div>
    <div class="stat-card"><div class="num" style="color:#555">${fromGitHub}</div><div class="label">GitHub下载</div></div>
    <div class="stat-card"><div class="num" style="color:#6e6e73">${fromMarket + builtin}</div><div class="label">市场+内置</div></div>
  `;
}

// Cumulative chart
function renderChart() {
  const max = Math.max(...totalCum, 1);
  const bar = (v,i) => {
    const pct = (v / max * 100).toFixed(1);
    const dpct = (totalDaily[i] / max * 100).toFixed(1);
    return `<div class="chart-row">
      <div class="chart-label">${labels[i]}</div>
      <div class="chart-bars">
        <div class="chart-bar-wrap"><div class="chart-bar cum" style="width:${pct}%"></div></div>
      </div>
      <div class="chart-num">${v}</div>
    </div>`;
  };
  document.getElementById('chart-card').innerHTML = totalCum.map((v,i)=>bar(v,i)).join('');
}

// Tooltip
function showTooltip(e, skill) {
  const tt = document.getElementById('tooltip');
  document.getElementById('tt-name').textContent = skill.n;
  document.getElementById('tt-total').textContent = `总调用: ${skill.t} 次`;
  const maxVal = Math.max(...skill.da, 1);
  document.getElementById('tt-rows').innerHTML = skill.da.map((v,i) => {
    const pct = (v / maxVal * 100).toFixed(1);
    const fillColor = v > 0 ? '#30d158' : 'rgba(255,255,255,0.15)';
    return `<div class="tt-row">
      <span class="day">${labels[i]}</span>
      <div class="tt-bar"><div class="tt-bar-fill" style="width:${pct}%;background:${fillColor}"></div></div>
      <span class="val">${v}</span>
    </div>`;
  }).join('');
  tt.classList.add('show');
  const rect = tt.getBoundingClientRect();
  let x = e.clientX + 12;
  let y = e.clientY - 10;
  if (x + rect.width > window.innerWidth - 16) x = e.clientX - rect.width - 12;
  if (y + rect.height > window.innerHeight - 16) y = window.innerHeight - rect.height - 16;
  if (y < 8) y = 8;
  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').classList.remove('show');
}

// Table render
function filterData(tab) {
  if(tab==='freq') return skills.filter(s=>s.t>=3);
  if(tab==='low') return skills.filter(s=>s.t>=1&&s.t<3);
  if(tab==='zero') return skills.filter(s=>s.t===0);
  return skills;
}

function getDot(c) {
  if(c>=8) return '<span class="status-dot dot-green"></span>';
  if(c>=3) return '<span class="status-dot dot-orange"></span>';
  if(c>=1) return '<span class="status-dot dot-gray"></span>';
  return '<span class="status-dot dot-red"></span>';
}
function getStatus(c) {
  if(c>=8) return '<span class="section-label sl-freq">高频</span>';
  if(c>=3) return '<span class="section-label sl-mid">中频</span>';
  if(c>=1) return '<span class="section-label sl-low">低频</span>';
  return '<span class="section-label sl-zero">未用</span>';
}
function getSource(s) {
  const map = {'self-made':'sl-self','github':'sl-github','marketplace':'sl-market','builtin':'sl-builtin','connector':'sl-connector'};
  const label = {'self-made':'自制','marketplace':'市场','github':'GitHub','builtin':'内置','connector':'连接器'};
  return `<span class="section-label ${map[s]||'sl-builtin'}">${label[s]||s}</span>`;
}
function getCallClass(c) {
  if(c>=8) return 'call-high';
  if(c>=3) return 'call-mid';
  if(c>=1) return 'call-low';
  return 'call-zero';
}

function render(tab) {
  currentTab = tab;
  const filtered = filterData(tab);
  filtered.sort((a,b)=>b.t-a.t || a.n.localeCompare(b.n));
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = filtered.map((s,i)=>{
    const wk = s.ca[s.ca.length-1] || 0;
    const dot = getDot(s.t);
    const status = getStatus(s.t);
    const cls = getCallClass(s.t);
    const desc = s.d || '';
    const last = s.l ? s.l.slice(0,10) : '—';
    return `<tr onmouseenter="showTooltip(event,skills.find(x=>x.n==='${s.n}'))" onmouseleave="hideTooltip()" onmousemove="moveTooltip(event,skills.find(x=>x.n==='${s.n}'))">
      <td style="color:var(--text-caption);font-size:13px">${i+1}</td>
      <td class="call-count ${cls}">${s.t}</td>
      <td class="skill-name">${dot}${s.n}</td>
      <td style="font-size:13px;color:var(--text-secondary);font-variant-numeric:tabular-nums">${wk}</td>
      <td>${getSource(s.s||'unknown')}</td>
      <td>${status}</td>
      <td class="desc">${desc}</td>
    </tr>`;
  }).join('');
}

function moveTooltip(e, skill) {
  const tt = document.getElementById('tooltip');
  if (!tt.classList.contains('show')) { showTooltip(e, skill); return; }
  const rect = tt.getBoundingClientRect();
  let x = e.clientX + 12;
  let y = e.clientY - 10;
  if (x + rect.width > window.innerWidth - 16) x = e.clientX - rect.width - 12;
  if (y + rect.height > window.innerHeight - 16) y = window.innerHeight - rect.height - 16;
  if (y < 8) y = 8;
  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
  render(tab);
}

renderStats();
renderChart();
render('all');
</script>
</body>
</html>
