<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkBuddy Skill Usage Report</title>
<style>
  :root {
    --bg: #f5f5f7;
    --surface: rgba(255,255,255,0.72);
    --surface-border: rgba(255,255,255,0.6);
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-caption: #8e8e93;
    --accent: #0071e3;
    --accent-soft: rgba(0,113,227,0.08);
    --green: #30d158;
    --green-soft: rgba(48,209,88,0.12);
    --orange: #ff9f0a;
    --orange-soft: rgba(255,159,10,0.12);
    --red: #ff3b30;
    --red-soft: rgba(255,59,48,0.10);
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 8px 32px rgba(0,0,0,0.06);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","PingFang SC","Helvetica Neue",sans-serif;
    background:var(--bg);color:var(--text-primary);
    -webkit-font-smoothing:antialiased;
    word-break:keep-all;overflow-wrap:anywhere;
    padding:0 24px;
  }
  .page{max-width:960px;margin:0 auto;padding:48px 0 96px}

  /* Header */
  .header{text-align:center;padding:64px 0 48px}
  .header .meta{display:flex;justify-content:center;gap:24px;font-size:14px;color:var(--text-caption);margin-top:12px;flex-wrap:wrap}
  .header .meta span{display:flex;align-items:center;gap:4px}
  .badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:500}
  .badge-green{background:var(--green-soft);color:#248a3d}
  .badge-orange{background:var(--orange-soft);color:#b86800}
  .badge-red{background:var(--red-soft);color:#b81b12}

  /* Section */
  .section{margin-bottom:48px}
  .section-title{font-size:20px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
  .section-title .count{font-size:14px;font-weight:400;color:var(--text-caption);background:var(--surface);padding:2px 10px;border-radius:20px}

  /* Card grid */
  .grid{display:grid;gap:12px}
  .grid-4{grid-template-columns:repeat(4,1fr)}
  .grid-3{grid-template-columns:repeat(3,1fr)}
  .grid-2{grid-template-columns:repeat(2,1fr)}
  @media(max-width:768px){.grid-4,.grid-3,.grid-2{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:480px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr}}

  /* Stat card */
  .stat-card{
    background:var(--surface);
    backdrop-filter:blur(40px) saturate(1.4);
    -webkit-backdrop-filter:blur(40px) saturate(1.4);
    border:1px solid var(--surface-border);
    border-radius:var(--radius);
    padding:20px;
    box-shadow:var(--shadow);
    text-align:center;
  }
  .stat-card .num{font-size:36px;font-weight:700;line-height:1.1}
  .stat-card .label{font-size:13px;color:var(--text-caption);margin-top:4px}

  /* Table */
  .table-wrap{
    background:var(--surface);
    backdrop-filter:blur(40px) saturate(1.4);
    -webkit-backdrop-filter:blur(40px) saturate(1.4);
    border:1px solid var(--surface-border);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    overflow:hidden;
  }
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{text-align:left;padding:14px 16px;font-weight:600;color:var(--text-secondary);font-size:12px;text-transform:uppercase;letter-spacing:0.5px;background:rgba(0,0,0,0.02)}
  td{padding:12px 16px;border-top:1px solid rgba(0,0,0,0.04);vertical-align:middle}
  tr:hover{background:rgba(0,0,0,0.02)}
  .skill-name{font-weight:500}
  .call-count{font-weight:600;font-variant-numeric:tabular-nums}
  .call-high{color:var(--accent)}
  .call-mid{color:var(--orange)}
  .call-low{color:var(--text-caption)}
  .call-zero{color:var(--red)}
  .desc{font-size:13px;color:var(--text-secondary);max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
  .dot-green{background:var(--green)}
  .dot-orange{background:var(--orange)}
  .dot-red{background:var(--red)}
  .dot-gray{background:#c7c7cc}

  /* Section labels */
  .section-label{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.3px}
  .sl-freq{background:var(--green-soft);color:#248a3d}
  .sl-low{background:var(--orange-soft);color:#b86800}
  .sl-zero{background:var(--red-soft);color:#b81b12}

  /* Footer */
  .footer{text-align:center;padding:32px 0;font-size:13px;color:var(--text-caption)}
  .footer a{color:var(--accent);text-decoration:none}
  .footer a:hover{text-decoration:underline}

  /* Tabs */
  .tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  .tab-btn{
    padding:8px 18px;border-radius:20px;border:none;
    font-size:14px;font-weight:500;cursor:pointer;
    background:var(--surface);color:var(--text-secondary);
    transition:all 0.2s;
  }
  .tab-btn:hover{background:var(--accent-soft);color:var(--accent)}
  .tab-btn.active{background:var(--accent);color:#fff}
</style>
</head>
<body>
<div class="page" id="app">

  <div class="header">
    <h1 style="font-size:40px;font-weight:700;letter-spacing:-0.5px">Skill Usage Report</h1>

  <div class="grid grid-4" style="margin-bottom:48px">

    <div class="stat-card"><div class="num" style="color:var(--orange)">18</div><div class="label">低频 (1-2次)</div></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('all')">全部</button>
    <button class="tab-btn" onclick="switchTab('freq')">高频</button>
    <button class="tab-btn" onclick="switchTab('low')">低频</button>
    <button class="tab-btn" onclick="switchTab('zero')">零调用</button>
  </div>

  <!-- Table -->
  <div class="table-wrap" id="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:50px">#</th>
          <th style="width:60px">调用</th>
          <th>技能名</th>
          <th>最后调用</th>
          <th>状态</th>
          <th>说明</th>
        </tr>
      </thead>
      <tbody id="table-body">

    </table>
  </div>

  <div class="footer">
    <p>数据来源：WorkBuddy 日志文件（2026-05-22 至 2026-06-06，~4GB）</p>
    <p><a href="https://github.com/wherejiahe-bot/skill-usage-report">GitHub 仓库</a></p>
  </div>
</div>

let currentTab = 'all';

function getDot(c) {
  if(c>=8) return '<span class="status-dot dot-green"></span>';
  if(c>=3) return '<span class="status-dot dot-orange"></span>';
  if(c>=1) return '<span class="status-dot" style="background:#8e8e93"></span>';
  return '<span class="status-dot dot-red"></span>';
}
function getStatus(c) {
  if(c>=8) return '<span class="section-label sl-freq">高频</span>';
  if(c>=3) return '<span class="section-label sl-low">中频</span>';
  if(c>=1) return '<span class="section-label" style="background:rgba(142,142,147,0.12);color:#6e6e73">低频</span>';
  return '<span class="section-label sl-zero">未用</span>';
}
function getCallClass(c) {
  if(c>=8) return 'call-high';
  if(c>=3) return 'call-mid';
  if(c>=1) return 'call-low';
  return 'call-zero';
}

function filterData(tab) {
  if(tab==='freq') return data.filter(d=>d.c>=3);
  if(tab==='low') return data.filter(d=>d.c>=1&&d.c<3);
  if(tab==='zero') return data.filter(d=>d.c===0);
  return data;
}

function render(tab) {
  currentTab = tab;
  const filtered = filterData(tab);
  // Sort: by calls desc, then alpha
  filtered.sort((a,b)=>b.c-a.c || a.n.localeCompare(b.n));
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = filtered.map((d,i)=>{
    const num = i+1;
    const dot = getDot(d.c);
    const status = getStatus(d.c);
    const cls = getCallClass(d.c);
    const last = d.l || '—';
    const desc = d.d || '';
    return `<tr>
      <td style="color:var(--text-caption);font-size:13px">${num}</td>
      <td class="call-count ${cls}">${d.c}</td>
      <td class="skill-name">${dot}${d.n}</td>
      <td style="font-size:13px;color:var(--text-secondary)">${last}</td>
      <td>${status}</td>
      <td class="desc">${desc}</td>
    </tr>`;
  }).join('');
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
  render(tab);
}

render('all');
</script>

</html>
